# MinecraftWorldModel 生产基线结构。
model:
  d: 384
  K: 5               # 动作查询数
  J: 8               # 历史动作长度
  max_skip: 8
  state_dec_mult: 2
  backbone:
    kind: dinov3     # dinov3=ViT-S/16(gated)| dinov2=ViT-S/14(开放权重备选)
    weights: null    # 覆盖 HF repo id(换更大变体);null=用 kind 默认 repo
  dynamics:
    kind: transformer
    num_layers: 4
    nhead: 8
    ffn_mult: 4
    dropout: 0.0
  heads:
    n_cam_bins: 11
