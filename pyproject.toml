[build-system]
requires = ["setuptools>=70", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "tao-not-42"
version = "0.2.0"
description = "Godot、CraftGround 与 Minecraft 行为克隆训练环境"
readme = "readme.md"
requires-python = ">=3.11"
license = {text = "MIT"}
dependencies = [
    "craftground",
    "numpy",
    "gymnasium",
    "opencv-python",
    "stable-baselines3",
    "torch",
]

[project.optional-dependencies]
dev = ["pytest>=7.0"]

[project.scripts]
train-godot-ppo = "rl_training_environments.godot.train_ppo:main"
train-minecraft-bc = "train.minecraft.behavior_cloning_warm_start:main"

[tool.setuptools.packages.find]
include = ["blocks*", "net*", "rl_training_environments*", "train*", "utils*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
addopts = "-q --tb=short"

[tool.black]
line-length = 100
target-version = ["py311"]

[tool.isort]
profile = "black"
line_length = 100
known_first_party = ["train", "utils"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
